apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: redis-cache
spec:
  type: state.redis
  version: v1
  metadata:
  - name: redisHost
    value: "{{.Values.dapr.redis.host}}:{{.Values.dapr.redis.port}}"
  - name: redisPassword
    value: "{{.Values.dapr.redis.password}}"
  - name: enableTLS
    value: "false"
  - name: actorStateStore
    value: "true"