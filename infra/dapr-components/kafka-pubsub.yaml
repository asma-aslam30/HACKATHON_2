apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: kafka-pubsub
  namespace: default
spec:
  type: pubsub.kafka
  version: v1
  metadata:
    - name: brokers
      value: "YOUR-REDPANDA-HOST:9092"
    - name: consumerGroup
      value: "todo-service"
    - name: authType
      value: "password"
    - name: saslUsername
      secretKeyRef:
        name: todo-secrets
        key: kafka-username
    - name: saslPassword
      secretKeyRef:
        name: todo-secrets
        key: kafka-password
    - name: saslMechanism
      value: "SCRAM-SHA-256"
    - name: TLSSkipVerify
      value: "false"
auth:
  secretStore: kubernetes
