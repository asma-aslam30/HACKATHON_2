apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: todo-backend
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/execution-environment: gen2
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: IMAGE_PLACEHOLDER
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: GEMINI_MODEL
              value: gemini-2.5-flash
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: todo-secrets
                  key: database-url
            - name: DATABASE_URL_UNPOOLED
              valueFrom:
                secretKeyRef:
                  name: todo-secrets
                  key: database-url
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: todo-secrets
                  key: gemini-api-key
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: todo-secrets
                  key: auth-secret
            - name: FRONTEND_URL
              valueFrom:
                secretKeyRef:
                  name: todo-secrets
                  key: frontend-url
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
