# Docker Compose — Todo App (Phase III/IV)
# Uses Neon DB (no local postgres needed)
# Usage:
#   1. Copy backend/.env.example to backend/.env and fill values
#   2. Copy todo-app-fullstack/.env.local.example to todo-app-fullstack/.env.local and fill values
#   3. docker-compose up --build

version: '3.9'

services:

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.backend
    container_name: todo-backend
    env_file:
      - backend/.env
    environment:
      FRONTEND_URL: http://localhost:3000
    ports:
      - "8000:8000"
    networks:
      - todo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # ── Next.js Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.frontend
    container_name: todo-frontend
    env_file:
      - todo-app-fullstack/.env.local
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - todo-network
    restart: unless-stopped

networks:
  todo-network:
    driver: bridge
