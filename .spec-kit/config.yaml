  features_dir: specs/features
  api_dir: specs/api
  database_dir: specs/database
  ui_dir: specs/ui
  infra_dir: specs/infrastructure
phases:
  - name: phase1-console
    features: [task-crud]
  - name: phase2-web
    features: [task-crud, authentication]
  - name: phase3-chatbot
    features: [task-crud, authentication, chatbot, mcp-tools]
  - name: phase4-kubernetes
    features: [task-crud, authentication, chatbot, mcp-tools, docker, helm]
  - name: phase5-cloud
    features: [task-crud, authentication, chatbot, mcp-tools, docker, helm, kafka, dapr]
