steps:
  # ── Step 1: Build Backend image ──────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: build-backend
    args:
      - build
      - -t
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/todo-app/todo-backend:$COMMIT_SHA'
      - -t
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/todo-app/todo-backend:latest'
      - -f
      - infra/docker/Dockerfile.backend
      - .

  # ── Step 2: Build Frontend image ─────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: build-frontend
    args:
      - build
      - -t
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/todo-app/todo-frontend:$COMMIT_SHA'
      - -t
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/todo-app/todo-frontend:latest'
      - -f
      - infra/docker/Dockerfile.frontend
      - --build-arg
      - NEXT_PUBLIC_BACKEND_URL=${_BACKEND_URL}
      - --build-arg
      - NEXT_PUBLIC_APP_URL=${_FRONTEND_URL}
      - .

  # ── Step 3: Push Backend image ───────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: push-backend
    waitFor: ['build-backend']
    args:
      - push
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/todo-app/todo-backend:$COMMIT_SHA'

  # ── Step 4: Push Frontend image ──────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: push-frontend
    waitFor: ['build-frontend']
    args:
      - push
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/todo-app/todo-frontend:$COMMIT_SHA'

  # ── Step 5: Deploy Backend to Cloud Run ──────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-backend
    waitFor: ['push-backend']
    entrypoint: gcloud
    args:
      - run
      - deploy
      - todo-backend
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/todo-app/todo-backend:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=3
      - --set-env-vars=GEMINI_MODEL=gemini-2.5-flash,PORT=8080,FRONTEND_URL=${_FRONTEND_URL}
      - --set-secrets=DATABASE_URL=database-url:latest,GEMINI_API_KEY=gemini-api-key:latest,BETTER_AUTH_SECRET=auth-secret:latest

  # ── Step 6: Deploy Frontend to Cloud Run ─────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-frontend
    waitFor: ['push-frontend']
    entrypoint: gcloud
    args:
      - run
      - deploy
      - todo-frontend
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/todo-app/todo-frontend:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=3000
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=3
      - --set-env-vars=NODE_ENV=production,PORT=3000,NEXT_PUBLIC_BACKEND_URL=${_BACKEND_URL},NEXT_PUBLIC_APP_URL=${_FRONTEND_URL},BETTER_AUTH_URL=${_FRONTEND_URL}
      - --set-secrets=DATABASE_URL=database-url:latest,DATABASE_URL_UNPOOLED=database-url:latest,AUTH_SECRET=auth-secret:latest,BETTER_AUTH_SECRET=auth-secret:latest

substitutions:
  _REGION: us-central1
  _BACKEND_URL: https://todo-backend-placeholder.run.app
  _FRONTEND_URL: https://todo-frontend-placeholder.run.app

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/todo-app/todo-backend:$COMMIT_SHA'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/todo-app/todo-frontend:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
